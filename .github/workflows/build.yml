# GitHub Actions: pri každej zmene v repozitári vygeneruje SEO stránky
# a nasadí web na GitHub Pages.
# UMIESTNENIE V REPOZITÁRI: .github/workflows/build.yml

name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        id: pages

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Vygeneruj SEO stránky
        run: python generator.py --out _site
        env:
          BASE_URL: ${{ steps.pages.outputs.base_url }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
